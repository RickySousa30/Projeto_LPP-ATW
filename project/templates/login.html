{% extends "base.html" %}

{% block title %}Iniciar Sessão | Laboratório Cultural ISPGAYA{% endblock %}

{% block content %}
<div class="auth-container">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="ph ph-lock-key" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
        <h2>Acesso Restrito</h2>
        <p style="font-size: 0.95rem;">Painel de Administração do Laboratório Cultural</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username" class="form-label">Nome de Utilizador</label>
            <div style="position: relative;">
                <i class="ph ph-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                <input type="text" id="username" name="username" class="form-control" style="padding-left: 2.5rem;" required autofocus>
            </div>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Palavra-passe</label>
            <div style="position: relative;">
                <i class="ph ph-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                <input type="password" id="password" name="password" class="form-control" style="padding-left: 2.5rem;" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 1rem;">
            Entrar <i class="ph ph-sign-in" style="vertical-align: middle;"></i>
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; font-size: 0.85rem; color: var(--text-light);">
        <p>Acesso reservado a administradores do ISPGAYA.</p>
    </div>
</div>
{% endblock %}
